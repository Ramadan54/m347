apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account
  template:
    metadata:
      labels:
        app: account
    spec:
      containers:
      - name: account
        image: ramadan54/m347:kn08-account
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
spec:
  selector:
    app: account
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buysell-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: buysell
  template:
    metadata:
      labels:
        app: buysell
    spec:
      containers:
      - name: buysell
        image: ramadan54/m347:kn08-buysell
        ports:
        - containerPort: 8002
        env:
        - name: ACCOUNT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: crypto-config
              key: account-service-url
---
apiVersion: v1
kind: Service
metadata:
  name: buysell-service
spec:
  selector:
    app: buysell
  ports:
    - protocol: TCP
      port: 8002
      targetPort: 8002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sendreceive-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sendreceive
  template:
    metadata:
      labels:
        app: sendreceive
    spec:
      containers:
      - name: sendreceive
        image: ramadan54/m347:kn08-sendreceive
        ports:
        - containerPort: 8003
        env:
        - name: ACCOUNT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: crypto-config
              key: account-service-url
---
apiVersion: v1
kind: Service
metadata:
  name: sendreceive-service
spec:
  selector:
    app: sendreceive
  ports:
    - protocol: TCP
      port: 8003
      targetPort: 8003
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ramadan54/m347:kn08-frontend
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30200
